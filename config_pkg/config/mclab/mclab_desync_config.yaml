%YAML:1.0

# IDENTIQUE a mclab_1_config.yaml, SAUF image_topic -> /cam0_desync
# (le flux camera re-publie avec offset+jitter par cam_desync.py).
# Sert a etudier la tolerance de VINS a la desync cam/IMU, avec mclab non-desync
# comme verite-terrain.

# Horloges et Topics
imu_topic: "/alphasense_driver_ros/imu"
image_topic: "/cam0_desync"
output_path: "/home/melanie/rov_ws"

# Modele de Camera Fisheye officiel de Camodocal
model_type: "KANNALA_BRANDT"
camera_name: "cam0_underwater"
image_width: 720
image_height: 540

projection_parameters:
   k2: 0.04816514299784573
   k3: 0.1707359987229406
   k4: -0.30080163056061726
   k5: 0.47220233022405056
   mu: 460.1163446727443
   mv: 460.4372977453345
   u0: 357.8825573770236
   v0: 266.43728860156045

# Extrinseques Camera -> IMU (T_ic)
estimate_extrinsic: 1
extrinsicRotation: !!opencv-matrix
   rows: 3
   cols: 3
   dt: d
   data: [ 0.00574588594214509, 0.005987169593925534, 0.9999655687047404,
           0.0009832777219597, 0.000620632174701985, -0.0057497036576725224,
           -0.0006550352564456685, 0.9999818841438872, -0.005983503393123035 ]
extrinsicTranslation: !!opencv-matrix
   rows: 3
   cols: 1
   dt: d
   data: [ 0.04839478722203644, 0.0479978115139549, -0.009770661863198023 ]

# Parametres de Bruit IMU
acc_n: 0.03
gyr_n: 0.002
acc_w: 0.00433
gyr_w: 0.002866
g_norm: 9.81

# Front-end
max_cnt: 120
min_dist: 30
freq: 10
F_threshold: 1.5
show_track: 1
equalize: 0
fisheye: 1

# Optimisation
max_solver_time: 0.04
max_num_iterations: 10
keyframe_parallax: 10.0

# Divers
loop_closure: 1
estimate_td: 1
td: 0.0
rolling_shutter: 0

pose_graph_save_path: "/home/melanie/rov_ws/"
